<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الإجازات السحابي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .login-form, .admin-panel, .employee-panel { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, textarea, button { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #667eea; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button.danger { background: #ff6b6b; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th, .table td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .table th { background: #f8f9fa; }
        .status-pending { color: #856404; background: #fff3cd; }
        .status-approved { color: #155724; background: #d4edda; }
        .status-rejected { color: #721c24; background: #f8d7da; }
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🏖️ نظام الإجازات السحابي</h1></div>

        <div id="loginScreen" class="login-form">
            <h2 style="text-align: center; margin-bottom: 20px;">تسجيل الدخول</h2>
            <input type="text" id="empCodeLogin" placeholder="أدخل الكود (ADMIN للرئيس أو كود الموظف)">
            <button onclick="login()" style="margin-top: 15px;">دخول</button>
        </div>

        <div id="adminPanel" class="admin-panel hidden">
            <div class="nav-buttons">
                <button onclick="showSection('employeesSection')">إدارة الموظفين</button>
                <button onclick="showSection('requestsSection')">الطلبات الواردة</button>
                <button onclick="logout()" class="danger">خروج</button>
            </div>
            
            <div id="employeesSection">
                <h3>إضافة / تعديل موظف</h3>
                <div class="form-grid">
                    <input type="text" id="empName" placeholder="اسم الموظف">
                    <input type="text" id="empCode" placeholder="كود الموظف (مثال: 1001)">
                    <input type="text" id="empTitle" placeholder="المسمى الوظيفي">
                    <input type="number" id="empBalance" placeholder="رصيد الإجازات">
                </div>
                <button onclick="addEmployee()">حفظ بيانات الموظف</button>
                
                <table class="table" id="employeesTable">
                    <thead><tr><th>الكود</th><th>الاسم</th><th>المسمى</th><th>الرصيد</th><th>إجراء</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div id="requestsSection" class="hidden">
                <h3>طلبات إجازات الموظفين</h3>
                <table class="table" id="requestsTable">
                    <thead><tr><th>الموظف</th><th>بداية الإجازة</th><th>الأيام</th><th>السبب</th><th>الحالة</th><th>إجراء</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="employeePanel" class="employee-panel hidden">
            <h2 id="welcomeMsg" style="margin-bottom: 15px; color: #555;"></h2>
            <div class="nav-buttons">
                <button onclick="showSection('newRequestSection')">طلب إجازة جديد</button>
                <button onclick="loadMyRequests()">سجل طلباتي</button>
                <button onclick="logout()" class="danger">خروج</button>
            </div>
            
            <div id="newRequestSection">
                <h3>تقديم طلب إجازة</h3>
                <div class="form-grid">
                    <input type="date" id="startDate" title="تاريخ بداية الإجازة">
                    <input type="number" id="days" placeholder="عدد الأيام المطلوبة">
                </div>
                <textarea id="reason" placeholder="سبب الإجازة (اختياري)" rows="3" style="margin-bottom: 15px;"></textarea>
                <button onclick="submitRequest()">إرسال الطلب للسحابة</button>
            </div>

            <div id="myRequestsSection" class="hidden">
                <h3>تاريخ طلباتي السابقة</h3>
                <table class="table" id="myRequestsTable">
                    <thead><tr><th>التاريخ</th><th>الأيام</th><th>السبب</th><th>الحالة</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- إعدادات سوبابيز (مستخرجة من حسابك) ---
        const SUPABASE_URL = 'https://ijahjrlunbkzerqnzgae.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_AzrJuN8u2lFWubntvWTHBg_FKz-mo6I';
        
        // تم تصحيح اسم المتغير هنا لمنع تعارض الأكواد
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // دالة تسجيل الدخول
        async function login() {
            const inputVal = document.getElementById('empCodeLogin').value.trim().toUpperCase();
            
            if (!inputVal) {
                alert('الرجاء إدخال الكود أولاً!');
                return;
            }

            // التحقق من المدير
            if (inputVal === 'ADMIN') {
                currentUser = { code: 'ADMIN', name: 'المدير العام' };
                showAdminPanel();
                return;
            }

            // التحقق من الموظف
            try {
                const { data, error } = await supabaseClient.from('employees').select('*').eq('code', inputVal).single();
                
                if (error) throw error;
                
                if (data) {
                    currentUser = data;
                    document.getElementById('welcomeMsg').innerText = `أهلاً بك، ${currentUser.name}`;
                    showEmployeePanel();
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert('❌ الكود غير صحيح أو الموظف غير مسجل في النظام.');
            }
        }

        // إضافة موظف جديد
        async function addEmployee() {
            const emp = {
                code: document.getElementById('empCode').value.trim().toUpperCase(),
                name: document.getElementById('empName').value.trim(),
                jobTitle: document.getElementById('empTitle').value.trim(),
                balance: parseInt(document.getElementById('empBalance').value) || 0
            };

            if (!emp.code || !emp.name) {
                alert('الرجاء إدخال كود واسم الموظف على الأقل!');
                return;
            }

            const { error } = await supabaseClient.from('employees').upsert([emp]);
            if (error) {
                alert('خطأ أثناء الحفظ: ' + error.message);
            } else {
                alert('✅ تم حفظ بيانات الموظف بنجاح!');
                document.getElementById('empCode').value = '';
                document.getElementById('empName').value = '';
                document.getElementById('empTitle').value = '';
                document.getElementById('empBalance').value = '';
                loadEmployees(); 
            }
        }

        // جلب وعرض الموظفين
        async function loadEmployees() {
            const { data } = await supabaseClient.from('employees').select('*').order('code');
            const tbody = document.querySelector('#employeesTable tbody');
            tbody.innerHTML = (data || []).map(e => `
                <tr>
                    <td>${e.code}</td>
                    <td>${e.name}</td>
                    <td>${e.jobTitle || '-'}</td>
                    <td>${e.balance} يوم</td>
                    <td><button onclick="deleteEmp('${e.code}')" class="danger" style="padding:6px 12px">حذف</button></td>
                </tr>
            `).join('');
        }

        // حذف موظف
        async function deleteEmp(code) {
            if (confirm('هل أنت متأكد من حذف هذا الموظف نهائياً؟')) {
                await supabaseClient.from('employees').delete().eq('code', code);
                loadEmployees();
            }
        }

        // إرسال طلب إجازة
        async function submitRequest() {
            const startDate = document.getElementById('startDate').value;
            const days = parseInt(document.getElementById('days').value);
            const reason = document.getElementById('reason').value;

            if (!startDate || !days || days <= 0) {
                alert('الرجاء تحديد تاريخ البداية وعدد أيام صحيح!');
                return;
            }

            const req = {
                empCode: currentUser.code,
                empName: currentUser.name,
                startDate: startDate,
                days: days,
                reason: reason,
                status: 'pending'
            };

            const { error } = await supabaseClient.from('requests').insert([req]);
            if (error) {
                alert('فشل الإرسال: ' + error.message);
            } else {
                alert('✅ تم إرسال طلب الإجازة للمدير بنجاح');
                document.getElementById('startDate').value = '';
                document.getElementById('days').value = '';
                document.getElementById('reason').value = '';
            }
        }

        // عرض كل الطلبات (للمدير)
        async function loadRequests() {
            const { data } = await supabaseClient.from('requests').select('*').order('id', { ascending: false });
            const tbody = document.querySelector('#requestsTable tbody');
            tbody.innerHTML = (data || []).map(r => `
                <tr class="status-${r.status}">
                    <td>${r.empName} <br><small>(${r.empCode})</small></td>
                    <td>${r.startDate}</td>
                    <td>${r.days} يوم</td>
                    <td>${r.reason || '-'}</td>
                    <td>${r.status === 'pending' ? '⏳ انتظار' : r.status === 'approved' ? '✅ مقبول' : '❌ مرفوض'}</td>
                    <td>
                        ${r.status === 'pending' ? `
                            <button onclick="updateReq(${r.id},'approved')" style="background:#28a745; padding:6px 10px;">قبول</button>
                            <button onclick="updateReq(${r.id},'rejected')" class="danger" style="padding:6px 10px;">رفض</button>
                        ` : 'تم الإجراء'}
                    </td>
                </tr>
            `).join('');
        }

        // تحديث حالة الطلب (قبول/رفض)
        async function updateReq(id, status) {
            if(confirm(`هل أنت متأكد أنك تريد ${status === 'approved' ? 'قبول' : 'رفض'} هذا الطلب؟`)) {
                await supabaseClient.from('requests').update({ status }).eq('id', id);
                loadRequests();
            }
        }

        // عرض طلباتي (للموظف)
        async function loadMyRequests() {
            showSection('myRequestsSection'); 
            const { data } = await supabaseClient.from('requests').select('*').eq('empCode', currentUser.code).order('id', { ascending: false });
            const tbody = document.querySelector('#myRequestsTable tbody');
            tbody.innerHTML = (data || []).map(r => `
                <tr class="status-${r.status}">
                    <td>${r.startDate}</td>
                    <td>${r.days} يوم</td>
                    <td>${r.reason || '-'}</td>
                    <td>${r.status === 'pending' ? '⏳ قيد المراجعة' : r.status === 'approved' ? '✅ تمت الموافقة' : '❌ مرفوض'}</td>
                </tr>
            `).join('');
        }

        // -- دوال التنقل بين الشاشات --
        function showAdminPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('employeePanel').classList.add('hidden');
            loadEmployees(); 
        }

        function showEmployeePanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('employeePanel').classList.remove('hidden');
            showSection('newRequestSection'); 
        }

        function showSection(id) {
            ['employeesSection', 'requestsSection', 'newRequestSection', 'myRequestsSection'].forEach(s => {
                const el = document.getElementById(s);
                if (el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if (id === 'requestsSection') loadRequests();
        }

        function logout() { 
            location.reload(); 
        }
    </script>
</body>
</html>
